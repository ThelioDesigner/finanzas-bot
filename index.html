<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FinanzasBot</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: Arial, sans-serif; font-size: 13px; display: flex; flex-direction: column; height: 100vh; background: #fff; }
header { padding: 12px 16px; border-bottom: 1px solid #eee; display: flex; align-items: center; gap: 10px; }
.logo { font-size: 14px; font-weight: bold; color: #1a73e8; }
.dot { width: 8px; height: 8px; border-radius: 50%; background: #34a853; animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
#msgs { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
.msg { display: flex; gap: 10px; }
.msg.user { flex-direction: row-reverse; }
.av { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: bold; flex-shrink: 0; margin-top: 2px; }
.av-bot { background: #e8f0fe; color: #1a73e8; }
.av-user { background: #f1f3f4; color: #666; }
.bbl { max-width: 78%; padding: 10px 14px; border-radius: 12px; line-height: 1.6; font-size: 13px; }
.msg.bot .bbl { background: #f1f3f4; color: #222; border-top-left-radius: 3px; }
.msg.user .bbl { background: #e8f0fe; color: #1a73e8; border-top-right-radius: 3px; }
.tbl { margin-top: 10px; border: 1px solid #ddd; border-radius: 6px; overflow: hidden; font-size: 12px; width: 100%; }
.tr { display: grid; grid-template-columns: 65px 1fr 80px; border-bottom: 1px solid #eee; }
.tr:last-child { border-bottom: none; }
.th { padding: 5px 8px; font-weight: bold; background: #f8f8f8; font-size: 10px; color: #666; border-right: 1px solid #eee; }
.th:last-child { border-right: none; }
.td { padding: 6px 8px; border-right: 1px solid #eee; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 12px; }
.td:last-child { border-right: none; }
.badge { display: inline-block; padding: 2px 7px; border-radius: 10px; font-size: 10px; font-weight: bold; }
.i { background: #e6f4ea; color: #137333; }
.g { background: #fce8e6; color: #c5221f; }
.a { background: #fef7e0; color: #b06000; }
.btns { display: flex; gap: 8px; margin-top: 10px; }
.btn { font-size: 12px; padding: 6px 14px; border-radius: 6px; cursor: pointer; border: 1px solid #ddd; background: #fff; color: #333; transition: all 0.15s; }
.btn.ok { border-color: #137333; color: #137333; }
.btn.ok:hover { background: #137333; color: #fff; }
.btn.cancel:hover { border-color: #c5221f; color: #c5221f; }
.inp-area { padding: 12px 16px; border-top: 1px solid #eee; flex-shrink: 0; }
.inp-row { display: flex; gap: 8px; align-items: flex-end; }
textarea { flex: 1; min-height: 44px; max-height: 110px; resize: none; font-size: 13px; padding: 10px 12px; border: 1px solid #ddd; border-radius: 8px; font-family: Arial, sans-serif; line-height: 1.5; outline: none; }
textarea:focus { border-color: #1a73e8; }
.send-btn { background: #1a73e8; color: #fff; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: bold; height: 44px; white-space: nowrap; }
.send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.hint { font-size: 11px; color: #aaa; margin-top: 6px; }
.summary { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; padding: 10px 16px; border-bottom: 1px solid #eee; }
.metric { background: #f8f8f8; border-radius: 6px; padding: 8px 12px; }
.metric-label { font-size: 10px; color: #888; margin-bottom: 2px; }
.metric-val { font-size: 15px; font-weight: bold; }
.v-i { color: #137333; }
.v-g { color: #c5221f; }
.v-a { color: #b06000; }
.dots span { display: inline-block; width: 5px; height: 5px; border-radius: 50%; background: #aaa; margin: 0 2px; animation: b 1.2s infinite; }
.dots span:nth-child(2) { animation-delay: .2s; }
.dots span:nth-child(3) { animation-delay: .4s; }
@keyframes b { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-5px)} }
</style>
</head>
<body>

<header>
  <div class="dot"></div>
  <div class="logo">FinanzasBot</div>
</header>

<div class="summary">
  <div class="metric"><div class="metric-label">Ingresos hoy</div><div class="metric-val v-i" id="sumI">$0</div></div>
  <div class="metric"><div class="metric-label">Gastos hoy</div><div class="metric-val v-g" id="sumG">$0</div></div>
  <div class="metric"><div class="metric-label">Ahorro hoy</div><div class="metric-val v-a" id="sumA">$0</div></div>
</div>

<div id="msgs">
  <div class="msg bot">
    <div class="av av-bot">FB</div>
    <div class="bbl">Hola. Contame los movimientos del día en lenguaje natural.<br><br>
    <span style="color:#aaa;font-size:12px">Ej: "Gasté $6885 en La Felipa, comida. Me entró $150.000 de Clarisa por la identidad."</span></div>
  </div>
</div>

<div class="inp-area">
  <div class="inp-row">
    <textarea id="inp" placeholder="Describí los movimientos del día..."></textarea>
    <button class="send-btn" id="sendBtn">Enviar</button>
  </div>
  <div class="hint">Enter para enviar · Shift+Enter para nueva línea</div>
</div>

<script>
const ANTHROPIC_KEY = "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";
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwY_n_FT8CMR6wFqTvTES6KRMfsz1iF1v8pE6YfqddRaWgBd3c8ptDIpilz1APkGTde/exec";

const CATS = ["Comida","Transporte","Servicios profesionales","Entretenimiento","Supermercado","Créditos y financiación","Suscripciones","Salud y cuidado personal","Indumentaria","Shopping","Hogar","Educación","Donaciones","Viajes","Electrónica","Otros"];
const MESES = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];

let pending = null;
let totals = { i: 0, g: 0, a: 0 };

document.getElementById('sendBtn').addEventListener('click', enviar);
document.getElementById('inp').addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); enviar(); }
});

function fmt(n) { return '$' + Math.round(n).toLocaleString('es-AR'); }
function esc(t) { return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function addMsg(role, html) {
  const area = document.getElementById('msgs');
  const d = document.createElement('div');
  d.className = 'msg ' + role;
  d.innerHTML = '<div class="av av-' + role + '">' + (role==='bot'?'FB':'VOS') + '</div><div class="bbl">' + html + '</div>';
  area.appendChild(d);
  area.scrollTop = area.scrollHeight;
}

function showTyping() {
  const area = document.getElementById('msgs');
  const d = document.createElement('div');
  d.className = 'msg bot'; d.id = 'typing';
  d.innerHTML = '<div class="av av-bot">FB</div><div class="bbl"><div class="dots"><span></span><span></span><span></span></div></div>';
  area.appendChild(d);
  area.scrollTop = area.scrollHeight;
}

function hideTyping() { const t = document.getElementById('typing'); if (t) t.remove(); }

function updateSummary(movs) {
  movs.forEach(function(m) {
    if (m.moneda === 'ARS') {
      if (m.tipo === 'ingreso') totals.i += Number(m.monto);
      else if (m.tipo === 'gasto') totals.g += Number(m.monto);
      else if (m.tipo === 'ahorro') totals.a += Number(m.monto);
    }
  });
  document.getElementById('sumI').textContent = fmt(totals.i);
  document.getElementById('sumG').textContent = fmt(totals.g);
  document.getElementById('sumA').textContent = fmt(totals.a);
}

async function enviar() {
  const inp = document.getElementById('inp');
  const text = inp.value.trim();
  if (!text) return;
  addMsg('user', esc(text));
  inp.value = '';
  document.getElementById('sendBtn').disabled = true;
  showTyping();

  const today = new Date();
  const fecha = today.toLocaleDateString('es-AR', {day:'2-digit',month:'2-digit',year:'numeric'});
  const mes = MESES[today.getMonth()];
  const año = today.getFullYear();

  const system = `Interpretá movimientos financieros en pesos argentinos. Respondé SOLO con JSON válido sin texto extra ni backticks.
Fecha: ${fecha} | Mes: ${mes} | Año: ${año}
Categorías: ${CATS.join(', ')}
Tipos: ingreso (categoria: "Ingresos proyectos" o "Ingreso fijo"), gasto, ahorro (categoria: "Ahorro USD")
Por cada movimiento: {tipo, descripcion, categoria, monto, moneda (ARS/USD), nota, fecha, mes, año}
Formato: {"movimientos":[...]}`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': ANTHROPIC_KEY,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 1000,
        system: system,
        messages: [{ role: 'user', content: text }]
      })
    });

    const data = await res.json();
    hideTyping();

    if (data.error) { addMsg('bot', 'Error de API: ' + data.error.message); document.getElementById('sendBtn').disabled = false; return; }

    const raw = data.content.map(function(b) { return b.text || ''; }).join('');
    let parsed;
    try { parsed = JSON.parse(raw.replace(/```json|```/g, '').trim()); }
    catch(e) { addMsg('bot', 'No pude interpretar eso. Reescribilo con más detalle.'); document.getElementById('sendBtn').disabled = false; return; }

    const movs = parsed.movimientos || [];
    if (!movs.length) { addMsg('bot', 'No detecté movimientos.'); document.getElementById('sendBtn').disabled = false; return; }

    pending = movs;

    let rows = '<div class="tbl"><div class="tr"><div class="th">Tipo</div><div class="th">Descripción</div><div class="th">Monto</div></div>';
    movs.forEach(function(m) {
      const bc = m.tipo==='ingreso'?'i':m.tipo==='ahorro'?'a':'g';
      const mo = m.moneda==='USD' ? 'U$S '+m.monto : fmt(m.monto);
      rows += '<div class="tr"><div class="td"><span class="badge '+bc+'">'+m.tipo+'</span></div><div class="td">'+m.descripcion+'</div><div class="td">'+mo+'</div></div>';
    });
    rows += '</div><div class="btns"><button class="btn ok" id="btnOk">Confirmar y guardar</button><button class="btn cancel" id="btnCancel">Corregir</button></div>';
    addMsg('bot', 'Esto interpreté:<br>' + rows);

    document.getElementById('btnOk').addEventListener('click', confirmar);
    document.getElementById('btnCancel').addEventListener('click', function() { pending = null; addMsg('bot', 'Entendido. Reescribilo con la corrección.'); });

  } catch(err) {
    hideTyping();
    addMsg('bot', 'Error de conexión: ' + err.message);
  }
  document.getElementById('sendBtn').disabled = false;
}

async function confirmar() {
  if (!pending) return;
  showTyping();
  try {
    await fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ movimientos: pending })
    });
    hideTyping();
    updateSummary(pending);
    addMsg('bot', 'Guardado. ' + pending.length + ' movimiento(s) registrado(s) en el Sheet.');
    pending = null;
  } catch(err) {
    hideTyping();
    addMsg('bot', 'Error al guardar en el Sheet: ' + err.message);
  }
}
</script>
</body>
</html>
