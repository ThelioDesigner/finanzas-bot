<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script>
(function(){
  const HASH = 'c871febf5d078cfdf7bf929e84ed8c0deddc5e10efaeb577e4be89afa0ee637f';
  async function sha256(msg) {
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(msg));
    return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
  }
  const stored = sessionStorage.getItem('fin_auth');
  if (stored !== HASH) {
    document.addEventListener('DOMContentLoaded', function() {
      document.body.innerHTML = '<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:#f5f4f0;font-family:Arial,sans-serif;">' +
        '<div style="background:#fff;border:1px solid #e0e0e0;border-radius:12px;padding:40px;width:320px;text-align:center;">' +
        '<div style="font-size:20px;font-weight:600;margin-bottom:8px;">Finanzas</div>' +
        '<div style="font-size:13px;color:#888;margin-bottom:24px;">Ingresá tu contraseña para continuar</div>' +
        '<input type="password" id="pwdInput" placeholder="Contraseña" style="width:100%;padding:10px 12px;border:1px solid #ddd;border-radius:8px;font-size:14px;outline:none;margin-bottom:12px;box-sizing:border-box;">' +
        '<div id="pwdError" style="color:#c0392b;font-size:12px;margin-bottom:10px;display:none;">Contraseña incorrecta</div>' +
        '<button id="pwdBtn" style="width:100%;padding:10px;background:#1a1a1a;color:#fff;border:none;border-radius:8px;font-size:14px;cursor:pointer;">Entrar</button>' +
        '</div></div>';
      async function check() {
        const val = document.getElementById('pwdInput').value;
        const h = await sha256(val);
        if (h === HASH) { sessionStorage.setItem('fin_auth', HASH); location.reload(); }
        else { document.getElementById('pwdError').style.display='block'; }
      }
      document.getElementById('pwdBtn').addEventListener('click', check);
      document.getElementById('pwdInput').addEventListener('keydown', function(e){ if(e.key==='Enter') check(); });
    });
  }
})();
</script>
<title>Finanzas — Dashboard</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
:root{--bg:#f5f4f0;--surface:#fff;--border:#e8e6e0;--text:#1a1a1a;--muted:#888;--income:#1a7a4a;--income-bg:#edf7f1;--expense:#c0392b;--expense-bg:#fdf0ee;--saving:#b07a00;--saving-bg:#fdf8ec;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
header{padding:28px 40px 20px;border-bottom:1px solid var(--border);background:var(--surface);display:flex;align-items:center;justify-content:space-between;}
.logo{font-size:20px;font-weight:600;letter-spacing:-0.5px;}
.logo span{font-weight:300;color:var(--muted);}
.last-update{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;}
nav{display:flex;gap:0;border-bottom:1px solid var(--border);background:var(--surface);padding:0 40px;}
.nav-btn{padding:12px 20px;font-size:13px;cursor:pointer;color:var(--muted);border-bottom:2px solid transparent;background:none;border-top:none;border-left:none;border-right:none;font-family:'DM Sans',sans-serif;transition:all 0.15s;}
.nav-btn.active{color:var(--text);border-bottom-color:var(--text);font-weight:500;}
.nav-btn:hover:not(.active){color:var(--text);}
.page{display:none;max-width:960px;margin:0 auto;padding:32px 24px;}
.page.active{display:block;}
.section-title{font-size:11px;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);margin-bottom:14px;}
.metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:36px;}
.metric{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px 22px;}
.metric-label{font-size:12px;color:var(--muted);margin-bottom:6px;}
.metric-val{font-size:26px;font-weight:600;letter-spacing:-1px;font-family:'DM Mono',monospace;}
.metric-sub{font-size:11px;color:var(--muted);margin-top:4px;}
.v-i{color:var(--income);}
.v-e{color:var(--expense);}
.v-s{color:var(--saving);}
.month-selector{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;}
.month-btn{font-size:12px;padding:5px 14px;border-radius:20px;border:1px solid var(--border);background:var(--surface);color:var(--muted);cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.15s;}
.month-btn.active{background:var(--text);color:#fff;border-color:var(--text);}
.table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:36px;}
table{width:100%;border-collapse:collapse;font-size:13px;}
thead tr{background:#fafaf8;border-bottom:1px solid var(--border);}
th{padding:11px 16px;text-align:left;font-size:11px;font-weight:500;letter-spacing:0.05em;text-transform:uppercase;color:var(--muted);}
td{padding:11px 16px;border-bottom:1px solid var(--border);}
tr:last-child td{border-bottom:none;}
tr:hover td{background:#fafaf8;}
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:500;}
.b-ingreso{background:var(--income-bg);color:var(--income);}
.b-gasto{background:var(--expense-bg);color:var(--expense);}
.b-ahorro{background:var(--saving-bg);color:var(--saving);}
.amount{font-family:'DM Mono',monospace;font-size:12px;}
.resumen-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin-bottom:36px;}
.resumen-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;}
.resumen-head{padding:14px 18px;border-bottom:1px solid var(--border);font-size:13px;font-weight:500;display:flex;justify-content:space-between;align-items:center;}
.resumen-row{display:flex;justify-content:space-between;align-items:center;padding:9px 18px;border-bottom:1px solid var(--border);font-size:13px;}
.resumen-row:last-child{border-bottom:none;}
.resumen-label{color:var(--muted);font-size:12px;}
.bar-wrap{height:4px;background:#eee;border-radius:2px;margin-top:4px;}
.bar-fill{height:4px;border-radius:2px;background:var(--expense);transition:width 0.5s;}
.empty{padding:36px;text-align:center;color:var(--muted);font-size:13px;}
.client-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:16px;}
.client-head{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;background:#fafaf8;}
.client-avatar{width:32px;height:32px;border-radius:50%;background:var(--income-bg);color:var(--income);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;}
.client-name{font-size:14px;font-weight:500;flex:1;}
.client-progress{font-size:12px;color:var(--muted);}
.proj-grid{display:grid;grid-template-columns:1fr 110px 90px 90px;gap:0;}
.proj-head{padding:8px 18px;font-size:10px;font-weight:500;letter-spacing:0.05em;text-transform:uppercase;color:var(--muted);border-bottom:1px solid var(--border);}
.proj-row{display:contents;}
.proj-row > div{padding:10px 18px;border-bottom:1px solid var(--border);font-size:12px;display:flex;align-items:center;}
.proj-row:last-child > div{border-bottom:none;}
.s-presup{background:#f1f3f4;color:#666;}
.s-activo{background:var(--income-bg);color:var(--income);}
.s-parcial{background:var(--saving-bg);color:var(--saving);}
.s-cobrado{background:var(--income-bg);color:var(--income);}
.saving-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px 24px;margin-bottom:16px;}
.saving-amount{font-size:32px;font-weight:600;font-family:'DM Mono',monospace;color:var(--saving);letter-spacing:-1px;margin-bottom:4px;}
.saving-label{font-size:12px;color:var(--muted);}
.savings-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin-bottom:36px;}
</style>
</head>
<body>

<header>
  <div class="logo">Finanzas <span>/ Dashboard</span></div>
  <div class="last-update" id="lastUpdate">Cargando...</div>
</header>

<nav>
  <button class="nav-btn active" onclick="showPage('resumen')">Resumen</button>
  <button class="nav-btn" onclick="showPage('movimientos')">Movimientos</button>
  <button class="nav-btn" onclick="showPage('clientes')">Clientes</button>
  <button class="nav-btn" onclick="showPage('ahorros')">Ahorros</button>
</nav>

<!-- RESUMEN -->
<div class="page active" id="page-resumen">
  <div class="section-title" style="margin-top:8px;">Mes actual</div>
  <div class="metrics">
    <div class="metric"><div class="metric-label">Ingresos</div><div class="metric-val v-i" id="mIngreso">—</div><div class="metric-sub" id="mIngresoSub"></div></div>
    <div class="metric"><div class="metric-label">Gastos</div><div class="metric-val v-e" id="mGasto">—</div><div class="metric-sub" id="mGastoSub"></div></div>
    <div class="metric"><div class="metric-label">Balance</div><div class="metric-val" id="mBalance">—</div><div class="metric-sub" id="mBalanceSub"></div></div>
  </div>
  <div class="section-title">Gastos por categoría — mes actual</div>
  <div class="table-wrap">
    <table>
      <thead><tr><th>Categoría</th><th style="text-align:right">Total</th><th style="width:180px">Proporción</th></tr></thead>
      <tbody id="catTable"><tr><td colspan="3" class="empty">Cargando...</td></tr></tbody>
    </table>
  </div>
  <div class="section-title">Resumen anual</div>
  <div class="resumen-grid" id="resumenGrid"><div class="resumen-card"><div class="empty">Cargando...</div></div></div>
</div>

<!-- MOVIMIENTOS -->
<div class="page" id="page-movimientos">
  <div class="month-selector" id="monthSelector" style="margin-top:8px;"></div>
  <div class="table-wrap">
    <table>
      <thead><tr><th>Fecha</th><th>Descripción</th><th>Categoría</th><th>Tipo</th><th style="text-align:right">Monto</th></tr></thead>
      <tbody id="movTable"><tr><td colspan="5" class="empty">Cargando...</td></tr></tbody>
    </table>
  </div>
</div>

<!-- CLIENTES -->
<div class="page" id="page-clientes">
  <div id="clientesContainer" style="margin-top:8px;"><div class="empty">Cargando...</div></div>
</div>

<!-- AHORROS -->
<div class="page" id="page-ahorros">
  <div class="savings-grid" id="savingsMetrics" style="margin-top:8px;"></div>
  <div class="section-title">Historial de ahorros</div>
  <div class="table-wrap">
    <table>
      <thead><tr><th>Fecha</th><th>Descripción</th><th style="text-align:right">USD</th><th>Mes</th></tr></thead>
      <tbody id="savingsTable"><tr><td colspan="4" class="empty">Cargando...</td></tr></tbody>
    </table>
  </div>
</div>

<script>
const SHEET_ID = '1D-QOpHETr7NKs2Gqx8MkTwwQCwS6MxeiR0YJlgCJ7OY';
const MESES = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];

let allData = [], resumenData = [], clientesData = [];
let selectedMonth = MESES[new Date().getMonth()];

function fmt(n) { return '$' + Math.round(Number(n)||0).toLocaleString('es-AR'); }
function fmtDate(v) {
  if (!v) return '';
  if (typeof v === 'string' && v.includes('/')) return v;
  const m = String(v).match(/Date\((\d+),(\d+),(\d+)\)/);
  if (m) { const d = new Date(+m[1], +m[2], +m[3]); return ('0'+d.getDate()).slice(-2)+'/'+('0'+(d.getMonth()+1)).slice(-2)+'/'+d.getFullYear(); }
  return String(v);
}

function showPage(p) {
  document.querySelectorAll('.page').forEach(function(el){el.classList.remove('active');});
  document.querySelectorAll('.nav-btn').forEach(function(el){el.classList.remove('active');});
  document.getElementById('page-'+p).classList.add('active');
  event.target.classList.add('active');
}

async function fetchSheet(sheet) {
  const url = 'https://docs.google.com/spreadsheets/d/'+SHEET_ID+'/gviz/tq?tqx=out:json&sheet='+encodeURIComponent(sheet);
  const res = await fetch(url);
  const text = await res.text();
  const json = JSON.parse(text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/)[1]);
  return json.table;
}

function parseRows(table) {
  if (!table||!table.rows) return [];
  return table.rows.map(function(r){return r.c ? r.c.map(function(c){return c?c.v:null;}) : [];});
}

async function loadAll() {
  try {
    const [gen, res, cli] = await Promise.all([
      fetchSheet('General'),
      fetchSheet('Resumen'),
      fetchSheet('Clientes').catch(function(){return null;})
    ]);

    allData = parseRows(gen).filter(function(r){return r[1];}).map(function(r){return {
      fecha: fmtDate(r[0]), tipo: r[1], descripcion: r[2], categoria: r[3],
      montoARS: Number(r[4])||0, montoUSD: Number(r[5])||0,
      nota: r[6]||'', mes: r[7]||'', año: r[8]||''
    };});

    resumenData = parseRows(res).filter(function(r){return r[0];}).map(function(r){return {
      mes: r[0], año: r[1], ingresos: Number(r[2])||0, gastos: Number(r[3])||0,
      ahorro: Number(r[4])||0, balance: Number(r[5])||0, usd: Number(r[6])||0
    };});

    if (cli) {
      clientesData = parseRows(cli).filter(function(r){return r[0];}).map(function(r){return {
        cliente: r[0], tipo: r[1], descripcion: r[2], monto: Number(r[3])||0,
        anticipo: r[4], estado: r[5], fecha: fmtDate(r[6])
      };});
    }

    document.getElementById('lastUpdate').textContent = 'Actualizado ' + new Date().toLocaleTimeString('es-AR');
    renderAll();
  } catch(e) {
    document.getElementById('lastUpdate').textContent = 'Error al cargar';
    console.error(e);
  }
}

function renderAll() {
  renderResumenPage();
  renderMonthSelector();
  renderMovimientos();
  renderClientes();
  renderAhorros();
}

function renderResumenPage() {
  const mes = resumenData.find(function(r){return r.mes===selectedMonth;});
  if (mes) {
    document.getElementById('mIngreso').textContent = fmt(mes.ingresos);
    document.getElementById('mIngresoSub').textContent = 'Ahorro objetivo: '+fmt(mes.ahorro);
    document.getElementById('mGasto').textContent = fmt(mes.gastos);
    const pct = mes.ingresos>0?Math.round(mes.gastos/mes.ingresos*100):0;
    document.getElementById('mGastoSub').textContent = pct+'% de los ingresos';
    const bal = mes.balance;
    const balEl = document.getElementById('mBalance');
    balEl.textContent = fmt(bal);
    balEl.className = 'metric-val '+(bal>=0?'v-i':'v-e');
    document.getElementById('mBalanceSub').textContent = bal>=0?'Resultado positivo':'Resultado negativo';
  }

  const gastosMes = allData.filter(function(r){return r.mes===selectedMonth&&r.tipo==='gasto';});
  const cats = {};
  gastosMes.forEach(function(r){if(!cats[r.categoria])cats[r.categoria]=0;cats[r.categoria]+=r.montoARS;});
  const sorted = Object.entries(cats).sort(function(a,b){return b[1]-a[1];});
  const max = sorted.length?sorted[0][1]:1;
  const catTbody = document.getElementById('catTable');
  catTbody.innerHTML = sorted.length ? sorted.map(function(entry){
    const pct = Math.round(entry[1]/max*100);
    return '<tr><td>'+entry[0]+'</td><td style="text-align:right"><span class="amount v-e">'+fmt(entry[1])+'</span></td><td><div class="bar-wrap"><div class="bar-fill" style="width:'+pct+'%"></div></div></td></tr>';
  }).join('') : '<tr><td colspan="3" class="empty">Sin gastos en '+selectedMonth+'</td></tr>';

  const grid = document.getElementById('resumenGrid');
  grid.innerHTML = resumenData.length ? resumenData.map(function(r){
    const bal = r.balance;
    return '<div class="resumen-card"><div class="resumen-head"><span>'+r.mes+' '+r.año+'</span></div>'+
      '<div class="resumen-row"><span class="resumen-label">Ingresos</span><span class="amount v-i">'+fmt(r.ingresos)+'</span></div>'+
      '<div class="resumen-row"><span class="resumen-label">Gastos</span><span class="amount v-e">'+fmt(r.gastos)+'</span></div>'+
      '<div class="resumen-row"><span class="resumen-label">Ahorro obj.</span><span class="amount v-s">'+fmt(r.ahorro)+'</span></div>'+
      '<div class="resumen-row"><span class="resumen-label">USD ahorrado</span><span class="amount v-s">U$S '+r.usd+'</span></div>'+
      '<div class="resumen-row"><span class="resumen-label">Balance</span><span class="amount '+(bal>=0?'v-i':'v-e')+'">'+fmt(bal)+'</span></div></div>';
  }).join('') : '<div class="resumen-card"><div class="empty">Sin datos</div></div>';
}

function renderMonthSelector() {
  const meses = [...new Set(allData.map(function(r){return r.mes;}).filter(Boolean))];
  const sel = document.getElementById('monthSelector');
  sel.innerHTML = '';
  MESES.forEach(function(m){
    if (!meses.includes(m)) return;
    const btn = document.createElement('button');
    btn.className = 'month-btn'+(m===selectedMonth?' active':'');
    btn.textContent = m;
    btn.addEventListener('click', function(){selectedMonth=m;renderAll();});
    sel.appendChild(btn);
  });
}

function renderMovimientos() {
  const data = allData.filter(function(r){return r.mes===selectedMonth;}).reverse();
  const tbody = document.getElementById('movTable');
  tbody.innerHTML = data.length ? data.map(function(r){
    const monto = r.montoUSD>0?'U$S '+r.montoUSD:fmt(r.montoARS);
    const color = r.tipo==='ingreso'?'v-i':r.tipo==='ahorro'?'v-s':'v-e';
    return '<tr>'+
      '<td style="color:var(--muted);font-size:11px;font-family:\'DM Mono\',monospace">'+r.fecha+'</td>'+
      '<td>'+r.descripcion+(r.nota?'<br><span style="font-size:11px;color:var(--muted)">'+r.nota+'</span>':'')+'</td>'+
      '<td style="color:var(--muted);font-size:12px">'+r.categoria+'</td>'+
      '<td><span class="badge b-'+r.tipo+'">'+r.tipo+'</span></td>'+
      '<td style="text-align:right"><span class="amount '+color+'">'+monto+'</span></td>'+
      '</tr>';
  }).join('') : '<tr><td colspan="5" class="empty">Sin movimientos en '+selectedMonth+'</td></tr>';
}

function renderClientes() {
  const cont = document.getElementById('clientesContainer');
  if (!clientesData.length) { cont.innerHTML = '<div class="empty">No hay clientes cargados.</div>'; return; }
  const grouped = {};
  clientesData.forEach(function(c){if(!grouped[c.cliente])grouped[c.cliente]=[];grouped[c.cliente].push(c);});
  cont.innerHTML = Object.entries(grouped).map(function(entry){
    const nombre = entry[0], proyectos = entry[1];
    const total = proyectos.reduce(function(s,p){return s+p.monto;},0);
    const cobrado = proyectos.reduce(function(s,p){
      if(p.estado==='cobrado') return s+p.monto;
      if(p.tipo==='proyecto'&&p.anticipo==='si') return s+p.monto*0.25;
      return s;
    },0);
    const pct = total>0?Math.round(cobrado/total*100):0;
    const rows = proyectos.map(function(p){
      const pend = p.tipo==='proyecto'?(p.estado==='cobrado'?0:p.anticipo==='si'?p.monto*0.75:p.monto):p.monto;
      const sc = p.estado==='cobrado'?'s-cobrado':p.anticipo==='si'&&p.tipo==='proyecto'?'s-parcial':p.estado==='presupuestado'?'s-presup':'s-activo';
      const st = p.estado==='cobrado'?'cobrado':p.anticipo==='si'&&p.tipo==='proyecto'?'anticipo cobrado':p.estado==='presupuestado'?'presupuestado':'activo';
      return '<div class="proj-row">'+
        '<div>'+p.descripcion+'<br><span style="font-size:11px;color:var(--muted)">'+p.tipo+(p.tipo==='mensualidad'?' — '+fmt(p.monto)+'/mes':'')+'</span></div>'+
        '<div>'+fmt(p.monto)+'</div>'+
        '<div><span class="amount v-e">'+fmt(pend)+'</span></div>'+
        '<div><span class="badge '+sc+'">'+st+'</span></div>'+
        '</div>';
    }).join('');
    return '<div class="client-card">'+
      '<div class="client-head">'+
        '<div class="client-avatar">'+nombre.charAt(0).toUpperCase()+'</div>'+
        '<div>'+
          '<div class="client-name">'+nombre+'</div>'+
          '<div class="client-progress">'+fmt(cobrado)+' cobrado de '+fmt(total)+' ('+pct+'%)</div>'+
        '</div>'+
      '</div>'+
      '<div class="proj-grid">'+
        '<div class="proj-head">Proyecto</div><div class="proj-head" style="text-align:right">Acordado</div><div class="proj-head" style="text-align:right">Pendiente</div><div class="proj-head">Estado</div>'+
        rows+
      '</div></div>';
  }).join('');
}

function renderAhorros() {
  const ahorros = allData.filter(function(r){return r.tipo==='ahorro';});
  const totalUSD = ahorros.reduce(function(s,r){return s+r.montoUSD;},0);
  const porMes = {};
  ahorros.forEach(function(r){if(!porMes[r.mes])porMes[r.mes]=0;porMes[r.mes]+=r.montoUSD;});

  document.getElementById('savingsMetrics').innerHTML =
    '<div class="saving-card"><div class="saving-amount">U$S '+totalUSD+'</div><div class="saving-label">Total ahorrado</div></div>'+
    '<div class="saving-card"><div class="saving-amount">'+Object.keys(porMes).length+'</div><div class="saving-label">Meses con ahorro</div></div>';

  const tbody = document.getElementById('savingsTable');
  tbody.innerHTML = ahorros.length ? ahorros.reverse().map(function(r){
    return '<tr>'+
      '<td style="font-size:11px;font-family:\'DM Mono\',monospace;color:var(--muted)">'+r.fecha+'</td>'+
      '<td>'+r.descripcion+'</td>'+
      '<td style="text-align:right"><span class="amount v-s">U$S '+r.montoUSD+'</span></td>'+
      '<td style="color:var(--muted);font-size:12px">'+r.mes+'</td>'+
      '</tr>';
  }).join('') : '<tr><td colspan="4" class="empty">Sin ahorros registrados</td></tr>';
}

loadAll();
setInterval(loadAll, 60000);
</script>
</body>
</html>
